<!-- SUCCESS MODAL FOR REPLIES -->
<div id="replySuccessModal" class="hidden fixed inset-0 z-[110] flex items-center justify-center px-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeReplySuccessModal()"></div>
    <div class="glass max-w-sm w-full p-10 rounded-[3rem] relative text-center animate-in zoom-in duration-300">
        <div class="w-24 h-24 rounded-[2rem] bg-emerald-500/20 text-emerald-500 mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-emerald-500/20">
            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h3 class="text-2xl font-bold text-white mb-2">Reply Sent!</h3>
        <p class="text-slate-400 text-sm leading-relaxed mb-10">
            Balasan Anda telah berhasil dikirim melalui Gmail dan tersimpan di database sistem.
        </p>
        <button onclick="closeReplySuccessModal()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl font-bold transition-all shadow-lg shadow-emerald-600/20">
            Done
        </button>
    </div>
</div>

<script>
    function openReplySuccessModal() {
        document.getElementById('replySuccessModal').classList.remove('hidden');
    }
    function closeReplySuccessModal() {
        document.getElementById('replySuccessModal').classList.add('hidden');
    }
</script>
